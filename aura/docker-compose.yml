services:
  mongo:
    image: mongo:7
    container_name: aura_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: aura_pgvector
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aura
      POSTGRES_PASSWORD: aura
      POSTGRES_DB: aura_vectors
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: aura_n8n
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678
      GENERIC_TIMEZONE: Asia/Colombo
      AURA_API_BASE: ${AURA_API_BASE:-http://host.docker.internal:3000}
      AURA_WEBHOOK_KEY: ${AURA_WEBHOOK_KEY:-}
      AURA_N8N_WEBHOOK_KEY: ${AURA_N8N_WEBHOOK_KEY:-}
      AURA_N8N_API_KEY: ${AURA_N8N_API_KEY:-}
      TELEGRAM_CLINICIAN_CHAT_ID: CHANGE_ME
      TELEGRAM_DEV_CHAT_ID: CHANGE_ME
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

volumes:
  mongo_data:
  pg_data:
  n8n_data:
